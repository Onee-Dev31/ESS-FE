name: PR Auto Merge

on:
  workflow_run:
    workflows: ['PR Gates']
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MERGE_METHOD: MERGE

concurrency:
  group: pr-auto-merge-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/github-script@v8
        env:
          MERGE_METHOD: ${{ env.MERGE_METHOD }}
        with:
          script: |
            const script = require('./.github/scripts/auto-merge-pr.js')
            await script({ github, context, core })
