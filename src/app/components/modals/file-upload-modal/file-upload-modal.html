<div class="upload-modal-overlay">
  <div class="upload-modal-content">
    <div class="modal-header">
      <h3>แนบไฟล์เอกสาร</h3>
      <button class="close-btn" (click)="close()" title="ปิด" aria-label="ปิด">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body">
      <p class="date-label">
        สำหรับวันที่: <strong>{{ dateUtil.formatDateToBE(dateLabel, 'DD/MM/YYYY') }}</strong>
      </p>

      <div class="upload-box" (dragover)="$event.preventDefault()" (drop)="onDrop($event)">
        <input type="file" id="fileInput" multiple (change)="onFileSelected($event)" hidden />

        <!-- Upload area -->
        <label for="fileInput" class="upload-trigger">
          <i class="fas fa-cloud-upload-alt"></i>
          <small class="span">ลากไฟล์มาวาง หรือคลิกเพื่ออัปโหลด</small>
          <small>(รองรับหลายไฟล์, สูงสุด 4MB/ไฟล์)</small>
        </label>

        <!-- File list -->
        <div class="file-list" *ngIf="tempFiles.length > 0">
          <div
            *ngFor="let file of tempFiles; let i = index"
            class="file-item"
            (click)="viewFile(file)"
          >
            <!-- icon -->
            <div class="file-icon">
              <i [ngClass]="getFileIcon(file)"></i>
            </div>

            <!-- info -->
            <div class="file-info">
              <div class="file-name">{{ file.name }}</div>
              <div class="file-size">{{ formatFileSize(file.size) }}</div>
            </div>

            <!-- remove -->
            <button class="remove-btn" (click)="$event.stopPropagation(); removeFile(i)">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="close()">ยกเลิก</button>
      <button
        class="btn-confirm"
        (click)="confirm()"
        [disabled]="tempFiles.length === 0 && !isDeleted"
      >
        บันทึก
      </button>
    </div>
  </div>
</div>

@if (isPreviewModalOpen()) {
  <app-file-preview-modal [files]="previewFiles()" (onClose)="closePreview()">
  </app-file-preview-modal>
}
