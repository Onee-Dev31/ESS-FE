<div class="vehicle-form-page">
  <header class="top-header-strip">
    <h2>เบิกค่ารถ (ก่อน 06:00 / หลัง 22:00)</h2>
    <button class="btn-close-modal" (click)="closeModal()">✕</button>
  </header>

  <main class="content-card">
    <section class="filter-section">
      <div class="month-selector">
        <label>ประจำเดือน :</label>
        <select [(ngModel)]="selectedMonthIndex" (change)="generateCalendar()" class="form-control">
          <option *ngFor="let m of thaiMonths; let i = index" [value]="i">{{ m }}</option>
        </select>
        <select [(ngModel)]="selectedYearBE" (change)="generateCalendar()" class="form-control">
          <option *ngFor="let y of years" [value]="y">{{ y }}</option>
        </select>
        <button class="btn-search" (click)="generateCalendar()">ค้นหาข้อมูล</button>
      </div>
    </section>

    <div class="action-bar">
      <button class="btn-submit" (click)="onSubmit()">ยืนยันการเบิก</button>

      <div class="info-badges">
        <span class="request-id-badge" *ngIf="requestId">เลขที่การเบิก : {{ requestId }}</span>
      </div>
    </div>

    <div class="table-container">
      <table class="excel-table">
        <colgroup>
          <col style="width: 50px" />
          <col style="width: 110px" />
          <col style="width: 90px" />
          <col style="width: 110px" />
          <col style="width: 60px" />
          <col style="width: 60px" />
          <col style="width: auto" />
        </colgroup>
        <thead>
          <tr>
            <th rowspan="2">เลือก</th>
            <th rowspan="2">วันที่</th>
            <th rowspan="2">ประเภทวัน</th>
            <th rowspan="2">รหัสกะ</th>
            <th colspan="2" class="col-time-header">เวลาทำงาน</th>
            <th rowspan="2">จำนวนเงิน</th>
            <th rowspan="2">รายละเอียดการเบิก</th>
          </tr>
          <tr class="sub-header">
            <th class="col-time-header">เข้า</th>
            <th class="col-time-header">ออก</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let log of logs" [class.highlight-row]="log.selected">
            <td class="text-center">
              <input type="checkbox" [(ngModel)]="log.selected" (change)="onToggleCheck(log)" />
            </td>
            <td class="text-center bg-gray">{{ log.date }}</td>
            <td class="text-center bg-gray font-bold" [style.color]="log.dayType === 'H' ? '#d93025' : '#3c4043'">
              {{ log.dayType }}
            </td>
            <td class="text-center bg-gray" style="font-size: 12px; color: #555;">
              {{ log.shiftCode }}
            </td>
            <td class="p-0">
              <input type="text" class="time-input" [ngModel]="log.timeIn" readonly />
            </td>
            <td class="p-0">
              <input type="text" class="time-input" [ngModel]="log.timeOut" readonly />
            </td>
            <td class="text-center font-bold">{{ (log.amount || 0) | number }}</td>
            <td class="desc-cell">
              <div class="input-container">
                <input type="text" class="table-input" [(ngModel)]="log.description" placeholder="ระบุรายละเอียด..."
                  [class.is-invalid]="log.selected && !log.description" (ngModelChange)="onInputChange(log)" />
              </div>
            </td>
          </tr>
        </tbody>
        <tfoot>
          <tr class="footer-row">
            <td colspan="5" class="total-label">รวมยอดเบิกทั้งสิ้น</td>
            <td class="total-val text-center">{{ (totalAmount || 0) | number }}</td>
            <td class="bg-white"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </main>
</div>
