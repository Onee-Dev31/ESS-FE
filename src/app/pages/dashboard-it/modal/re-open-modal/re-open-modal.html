<div class="modal-overlay reOpenTicket">
  <div class="modal-container">
    <div>
      <header class="top-header-strip">
        <h2>อธิบายเหตุผล</h2>
      </header>

      <form #reOpenForm="ngForm" (ngSubmit)="save(reOpenForm)">
        <div class="content-card">
          <textarea
            class="form-input deny"
            name="reason"
            ngModel
            required
            placeholder="อธิบายรายละเอียด..."
          ></textarea>

          <div
            *ngIf="reOpenForm.submitted && reOpenForm.invalid"
            style="color: red; margin-top: 6px"
          >
            กรุณากรอกเหตุผลในการยกเลิก
          </div>
        </div>

        <div class="form-actions-footer">
          <button type="button" class="btn-back-custom" (click)="close()">
            <i class="fas fa-times"></i> ยกเลิก
          </button>

          <button type="submit" class="btn-save-custom" [disabled]="reOpenForm.invalid">
            <i class="fas fa-paper-plane"></i> ยืนยัน
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
