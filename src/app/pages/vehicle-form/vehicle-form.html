<div class="vehicle-form-page">
  <div class="top-header-strip">
    <h2>เบิกค่ารถ (ก่อน 06:00 น. / หลัง 22:00 น.)</h2>
    <button class="btn-close-modal" (click)="closeModal()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="content-card">
    <div class="filter-section">
      <div class="month-selector">
        <label>ประจำเดือน :</label>
        <select [(ngModel)]="selectedMonthIndex" (change)="generateCalendar()" class="form-control">
          <option *ngFor="let m of thaiMonths; let i = index" [value]="i">{{ m }}</option>
        </select>
        <select [(ngModel)]="selectedYearBE" (change)="generateCalendar()" class="form-control">
          <option *ngFor="let y of years" [value]="y">{{ y }}</option>
        </select>
        <button class="btn-search" (click)="generateCalendar()">ค้นหา</button>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-submit" (click)="onSubmit()">เบิก</button>
      <div class="right-info">รหัสกะ : 001 | เวลาที่กำหนด 09:00 - 18:00</div>
    </div>

    <div class="table-container">
      <table class="excel-table">
        <thead>
          <tr>
            <th class="col-check">เลือก</th>
            <th class="col-date">วันที่</th>
            <th class="col-type">ประเภทวัน</th>
            <th class="col-time" colspan="2">เวลาทำงาน</th>
            <th class="col-amount">จำนวนเงิน</th>
            <th class="col-desc">รายละเอียดการเบิก</th>
          </tr>
          <tr class="sub-header">
            <th></th><th></th><th></th>
            <th>เข้า</th><th>ออก</th>
            <th></th><th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let log of logs" [class.highlight-row]="log.selected" [class.holiday-row]="log.dayType === 'H'">
            <td class="text-center">
              <input type="checkbox" [(ngModel)]="log.selected" (change)="onToggleCheck(log)">
            </td>
            <td class="text-center bg-gray">{{ log.date }}</td>
            <td class="text-center bg-gray" [style.color]="log.dayType === 'H' ? 'red' : 'inherit'">{{ log.dayType }}</td>
            
            <td class="text-center">
              <input type="text" class="time-input" [(ngModel)]="log.timeIn" placeholder="--:--" 
                     maxlength="5" [disabled]="!log.selected"
                     (keypress)="onTimeKeyPress($event)" (input)="onTimeInputChange(log, 'timeIn')">
            </td>
            
            <td class="text-center">
              <input type="text" class="time-input" [(ngModel)]="log.timeOut" placeholder="--:--" 
                     maxlength="5" [disabled]="!log.selected"
                     (keypress)="onTimeKeyPress($event)" (input)="onTimeInputChange(log, 'timeOut')">
            </td>

            <td class="text-center amount-cell"><span *ngIf="log.selected">{{ log.amount }}</span></td>
            <td class="desc-cell">
              <input type="text" class="table-input" [(ngModel)]="log.description" [disabled]="!log.selected"
                     [class.is-invalid]="log.selected && !log.description">
              <span class="required-alert" *ngIf="log.selected && !log.description">*Required field</span>
            </td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="5" class="text-right label-total">รวมจำนวนเงิน</td>
            <td class="text-center value-total">{{ totalAmount }}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>
