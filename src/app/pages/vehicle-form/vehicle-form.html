<div class="vehicle-form-page">
  <div class="top-header-strip">
    <h2>เบิกค่ารถ (ก่อน 06:00 น. / หลัง 22:00 น.)</h2>
    <button class="btn-close-modal" (click)="closeModal()">✕</button>
  </div>

  <div class="content-card">
    <div class="filter-section">
      <div class="month-selector">
        <label>งวดประจำเดือน :</label>
        <select [(ngModel)]="selectedMonthIndex" (change)="generateCalendar()" class="form-control">
          <option *ngFor="let m of thaiMonths; let i = index" [value]="i">{{ m }}</option>
        </select>
        <select [(ngModel)]="selectedYearBE" (change)="generateCalendar()" class="form-control">
          <option *ngFor="let y of years" [value]="y">{{ y }}</option>
        </select>
        <button class="btn-search" (click)="generateCalendar()">ค้นหาข้อมูล</button>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-submit" (click)="onSubmit()">ยืนยันการเบิก</button>
      <div class="right-info">รหัสกะ : 001 | เวลาที่กำหนด 09:00 - 18:00</div>
    </div>

    <div class="table-container">
      <table class="excel-table">
        <colgroup>
          <col style="width: 50px;"> <col style="width: 110px;"> <col style="width: 85px;"> <col style="width: 80px;"> <col style="width: 80px;"> <col style="width: 110px;"> <col style="width: auto;"> </colgroup>
        <thead>
          <tr>
            <th rowspan="2">เลือก</th>
            <th rowspan="2">วันที่</th>
            <th rowspan="2">ประเภทวัน</th>
            <th colspan="2" class="col-time-header">เวลาทำงาน</th>
            <th rowspan="2">จำนวนเงิน</th>
            <th rowspan="2">รายละเอียดการเบิก / สถานที่ไป</th>
          </tr>
          <tr class="sub-header">
            <th class="col-time-header">เข้า</th>
            <th class="col-time-header">ออก</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let log of logs" [class.highlight-row]="log.selected">
            <td class="text-center">
              <input type="checkbox" [(ngModel)]="log.selected" (change)="onToggleCheck(log)">
            </td>
            <td class="text-center bg-gray">{{ log.date }}</td>
            <td class="text-center bg-gray font-bold" 
                [style.color]="log.dayType === 'H' ? '#d93025' : (log.dayType === 'W' ? '#3c4043' : '#1a73e8')">
                {{ log.dayType }}
            </td>
            <td class="p-0">
              <input type="text" class="time-input" [(ngModel)]="log.timeIn" placeholder="--" 
                     maxlength="5" (keypress)="onTimeKeyPress($event)" (input)="onTimeInputChange(log, 'timeIn')"
                     [disabled]="!log.selected">
            </td>
            <td class="p-0">
              <input type="text" class="time-input" [(ngModel)]="log.timeOut" placeholder="--" 
                     maxlength="5" (keypress)="onTimeKeyPress($event)" (input)="onTimeInputChange(log, 'timeOut')"
                     [disabled]="!log.selected">
            </td>
            <td class="text-center amount-val">{{ log.amount }}</td>
            <td class="desc-cell">
              <div class="input-wrapper">
                <input type="text" class="table-input" [(ngModel)]="log.description" 
                       placeholder="ระบุรายละเอียด..."
                       [class.is-invalid]="log.selected && !log.description"
                       [disabled]="!log.selected">
              </div>
            </td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="5" style="text-align: right; padding-right: 20px; font-weight: bold; color: #5f6368;">รวมยอดเบิกทั้งสิ้น</td>
            <td class="total-val">{{ totalAmount | number }}</td>
            <td class="bg-white"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>
