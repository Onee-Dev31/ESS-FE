<div class="vehicle-taxi-form-page">
  <header class="top-header-strip">
    <h2>บันทึกข้อมูลค่าเดินทาง (Taxi)</h2>
    <button class="btn-close-modal" (click)="cancel()">✕</button>
  </header>

  <main class="content-card">

    <section class="filter-section">
      <div class="month-selector">
        <label>ประจำเดือน :</label>

        <select class="form-control" style="width: 140px;" [(ngModel)]="selectedMonth" (change)="generateMockData()">
          <option *ngFor="let m of thaiMonths" [value]="m">{{ m }}</option>
        </select>

        <select class="form-control" style="width: 100px;" [(ngModel)]="selectedYear" (change)="generateMockData()">
          <option *ngFor="let y of years" [value]="y">{{ y }}</option>
        </select>

        <button class="btn-search" (click)="generateMockData()">ค้นหาข้อมูล</button>
      </div>
    </section>

    <div class="action-bar">
      <button class="btn-submit" (click)="save()">ยืนยันการเบิก</button>

      <div class="info-badges">
        <span class="request-id-badge">เลขที่การเบิก : {{ requestId }}</span>
      </div>
    </div>

    <div class="table-container">
      <table class="excel-table">
        <colgroup>
          <col style="width: 50px" />
          <col style="width: 95px" />
          <col style="width: 60px" />
          <col style="width: 110px" />
          <col style="width: 55px" />
          <col style="width: 55px" />
          <col style="width: auto" />
          <col style="width: auto" />
          <col style="width: 60px" />
          <col style="width: 70px" />
          <col style="width: 50px" />
        </colgroup>

        <thead>
          <tr>
            <th rowspan="2">เลือก</th>
            <th rowspan="2">วันที่</th>
            <th rowspan="2">ประเภทวัน</th>
            <th rowspan="2">รหัสกะ</th>
            <th colspan="2" class="col-time-header">เวลาทำงาน</th>

            <th rowspan="2">รายละเอียดการเบิก <span style="color:red">*</span></th>
            <th rowspan="2">จุดหมาย <span style="color:red">*</span></th>

            <th rowspan="2">ระยะทาง <span style="color:red">*</span><br>(Km.)</th>
            <th rowspan="2">จำนวนเงิน <span style="color:red">*</span></th>
            <th rowspan="2">ไฟล์</th>
          </tr>
          <tr class="sub-header">
            <th class="col-time-header">เข้า</th>
            <th class="col-time-header">ออก</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of items" [class.highlight-row]="item.selected">
            <td class="text-center">
              <input type="checkbox" [(ngModel)]="item.selected" />
            </td>
            <td class="text-center bg-gray">{{ item.date }}</td>
            <td class="text-center bg-gray font-bold" [style.color]="item.dayType === 'H' ? '#d93025' : '#3c4043'">
              {{ item.dayType }}
            </td>
            <td class="text-center bg-gray" style="font-size: 12px; color: #555;">
              {{ item.shiftCode }}
            </td>
            <td class="p-0"><input type="text" class="time-input" [ngModel]="item.checkIn || '-'" readonly /></td>
            <td class="p-0"><input type="text" class="time-input" [ngModel]="item.checkOut || '-'" readonly /></td>

            <td class="desc-cell">
              <div class="input-container">
                <input type="text" class="table-input" [(ngModel)]="item.description"
                  [class.is-invalid]="item.selected && !item.description" (ngModelChange)="onInputChange(item)"
                  placeholder="รายละเอียด..." />
              </div>
            </td>

            <td class="desc-cell">
              <div class="input-container">
                <input type="text" class="table-input" [(ngModel)]="item.destination"
                  [class.is-invalid]="item.selected && !item.destination" (ngModelChange)="onInputChange(item)"
                  placeholder="ระบุจุดหมาย" />
              </div>
            </td>

            <td class="desc-cell">
              <div class="input-container">
                <input type="number" class="table-input text-center" [(ngModel)]="item.distance"
                  [class.is-invalid]="item.selected && (!item.distance || item.distance <= 0)"
                  (ngModelChange)="onInputChange(item)" />
              </div>
            </td>

            <td class="desc-cell">
              <div class="input-container">
                <input type="number" class="table-input text-center font-bold" [(ngModel)]="item.amount"
                  [class.is-invalid]="item.selected && (!item.amount || item.amount <= 0)"
                  (ngModelChange)="onInputChange(item)" />
              </div>
            </td>

            <td class="text-center">
              <button class="btn-icon-folder" (click)="openUploadModal(item)" [class.has-file]="item.attachedFile">
                <i class="fas fa-solid fa-file-arrow-up"></i>
              </button>
            </td>
          </tr>
        </tbody>

        <tfoot>
          <tr class="footer-row">
            <td colspan="8" class="total-label">รวมยอดเบิกทั้งสิ้น</td>
            <td class="total-val text-center">{{ getTotalAmount() | number }}</td>
            <td class="bg-white"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </main>

  <app-file-upload-modal *ngIf="isShowUploadModal" [currentFileName]="currentUploadItem?.attachedFile"
    [dateLabel]="currentUploadItem?.date" (onSave)="handleFileSave($event)" (onClose)="closeUploadModal()">
  </app-file-upload-modal>

</div>
