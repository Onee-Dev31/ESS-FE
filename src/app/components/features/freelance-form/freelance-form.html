<div class="modal-overlay" *ngIf="isOpen" (click)="handleClose()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <!-- Header with close button -->
        <div class="form-header">
            <h2>ข้อมูลพนักงาน</h2>
            <button class="btn-close" (click)="handleClose()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="modal-content">
            <form class="freelance-form">
                <div class="form-row">
                    <div class="form-field">
                        <label>ชื่อจริง</label>
                        <input nz-input placeholder="ชื่อจริงภาษาไทย" [(ngModel)]="formData.firstNameTh"
                            name="firstNameTh" class="form-input" />
                    </div>
                    <div class="form-field">
                        <label>นามสกุล</label>
                        <input nz-input type="text" class="form-input" placeholder="นามสกุลภาษาไทย"
                            [(ngModel)]="formData.lastNameTh" name="lastNameTh">
                    </div>
                    <div class="form-field">
                        <label>ชื่อเล่น</label>
                        <input nz-input type="text" class="form-input" placeholder="ชื่อเล่น"
                            [(ngModel)]="formData.nickname" name="nickname">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label>First name</label>
                        <input nz-input type="text" class="form-input" placeholder="ชื่อจริงภาษาอังกฤษ"
                            [(ngModel)]="formData.firstNameEn" name="firstNameEn">
                    </div>
                    <div class="form-field">
                        <label>Last name</label>
                        <input nz-input type="text" class="form-input" placeholder="นามสกุลภาษาอังกฤษ"
                            [(ngModel)]="formData.lastNameEn" name="lastNameEn">
                    </div>
                    <div class="form-field">
                        <label>เบอร์โทรศัพท์</label>
                        <input nz-input type="tel" class="form-input" placeholder="เบอร์โทรศัพท์"
                            [(ngModel)]="formData.phone" name="phone">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label>Email</label>
                        <input nz-input type="email" class="form-input" placeholder="xxxxx@gmail.com"
                            [(ngModel)]="formData.email" name="email">
                    </div>
                    <div class="form-field">
                        <label>วันที่เริ่มสัญญา</label>
                        <nz-date-picker [(ngModel)]="formData.startDate" nzFormat="dd/MM/yyyy" name="startDate"
                            class="form-input">
                        </nz-date-picker>
                    </div>
                    <div class="form-field">
                        <label>วันที่สิ้นสุดสัญญา</label>
                        <nz-date-picker [(ngModel)]="formData.endDate" nzFormat="dd/MM/yyyy" name="endDate"
                            class="form-input">
                        </nz-date-picker>
                    </div>
                </div>
                <div class="form-row ">
                    <div class="form-field">
                        <label>บริษัท</label>
                        <nz-select nzShowSearch nzAllowClear nzPlaceHolder="เลือกบริษัท" [(ngModel)]="formData.company"
                            name="company" class="form-input" (ngModelChange)="onCompanyChange($event)">
                            <nz-option nzLabel="เลือกบริษัท" nzValue="" nzDisabled />
                            <nz-option *ngFor="let company of companyList" [nzLabel]="company.COMPANY_NAME"
                                [nzValue]="company.COMPANY_CODE" />
                        </nz-select>
                    </div>
                    <div class="form-field">
                        <label>แผนก</label>
                        <nz-select nzShowSearch nzAllowClear nzPlaceHolder="เลือกแผนก" [(ngModel)]="formData.department"
                            name="department" class="form-input" [nzDisabled]="!formData.company"
                            [class.disabled]="!formData.company">
                            <nz-option nzLabel="เลือกแผนก" nzValue="" nzDisabled />
                            <nz-option *ngFor="let dept of departmentList"
                                [nzLabel]="dept.COSTCENT + ' - ' + dept.NAMECOSTCENT" [nzValue]="dept.COSTCENT" />
                        </nz-select>
                    </div>
                    <div class="form-field">
                        <label>ตำแหน่ง</label>
                        <input nz-input class="form-input" [(ngModel)]="formData.position" name="position">
                    </div>
                </div>


                <div class="form-row">
                    <div class="form-field">
                        <label>เงินเดือน</label>
                        <input nz-input type="text" class="form-input" [(ngModel)]="salaryDisplay" name="salary"
                            (input)="onMoneyInput('salary', $event)" placeholder="1x,xxx.xx">
                    </div>

                    <div class="form-field">
                        <label>รายได้อื่น</label>
                        <input nz-input type="text" class="form-input" [(ngModel)]="otherIncomeDisplay"
                            name="otherIncome" (input)="onMoneyInput('otherIncome', $event)" placeholder="1x,xxx.xx">
                    </div>

                    <div class="form-field">
                        <label>ยอดรวม</label>
                        <input nz-input type="text" class="form-input readonly"
                            [value]="formatMoney(formData.totalIncome)" readonly>
                    </div>
                </div>


                <div class="form-row four-cols">
                    <div class="form-field">
                        <label>เลขที่บัญชี</label>
                        <input nz-input type="text" class="form-input" placeholder="1234567890000"
                            [(ngModel)]="formData.accountNumber" name="accountNumber">
                    </div>
                    <div class="form-field">
                        <label>ธนาคาร</label>
                        <nz-select nzShowSearch nzAllowClear nzPlaceHolder="เลือกธนาคาร" [(ngModel)]="formData.bank"
                            name="department" class="form-input">
                            <nz-option nzLabel="เลือกธนาคาร" nzValue="" nzDisabled />
                            <nz-option *ngFor="let bank of bankList" [nzLabel]="bank" [nzValue]="bank" />
                        </nz-select>
                    </div>
                    <div class="form-field">
                        <label>เลขที่ Supplier</label>
                        <input nz-input type="text" class="form-input disabled" placeholder="2Axxxxxx" disabled>
                    </div>
                    <div class="form-field">
                        <label>AD User</label>
                        <input nz-input type="text" class="form-input disabled" placeholder="2Axxxxxx" disabled>
                    </div>
                    <!-- <div class="form-field">
                        <label>รหัสพนักงาน</label>
                        <input nz-input type="text" class="form-input" placeholder="FOTD000001"
                            [(ngModel)]="formData.fotdNumber" name="fotdNumber">
                    </div> -->
                </div>

                <div class="form-row">
                    <div class="form-field full-width">
                        <label>แบบไฟล์</label>
                        <label class="file-upload-wrapper">
                            <input type="file" multiple (change)="onFileSelect($event)" class="hidden-input">

                            <div class="file-select-box">
                                <i class="fas fa-folder-open"></i>
                                <span>D://zzzzz.png</span>
                            </div>

                            <div class="btn-upload">Upload</div>
                        </label>

                        <!-- Uploaded files list -->
                        <div class="uploaded-files" *ngIf="uploadedFiles.length > 0">
                            <div class="file-item" *ngFor="let file of uploadedFiles; let i = index">
                                <i class="fas fa-file-pdf"></i>
                                <span>{{ file.name }}</span>
                                <button type="button" class="btn-remove" (click)="removeFile(i)">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>


                <!-- Action buttons - NOW OUTSIDE modal-content -->
                <div class="form-actions">
                    <button type="button" class="btn-resign" (click)="handleResign()">ลาออก</button>
                    <button type="button" class="btn-save" (click)="handleSave()">Save</button>
                    <button type="button" class="btn-clear" (click)="handleClose()">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Resign Date Modal -->
    <div class="modal-overlay resign-modal-overlay" *ngIf="showResignModal" (click)="closeResignModal()">
        <div class="modal-container small-modal" (click)="$event.stopPropagation()">
            <div class="form-header">
                <h2>ระบุวันที่ลาออก</h2>
                <button class="btn-close" (click)="closeResignModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-content">
                <div class="form-row">
                    <div class="form-field">
                        <label>วันที่ลาออก</label>
                        <input type="date" class="form-input" [(ngModel)]="resignDate">
                    </div>
                    <div class="form-field">
                        <label>วันสุดท้ายที่มาทำงาน</label>
                        <input type="date" class="form-input" [(ngModel)]="lastWorkingDate">
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-confirm-resign" (click)="confirmResign()">ยืนยัน</button>
                <button type="button" class="btn-clear" (click)="closeResignModal()">ยกเลิก</button>
            </div>
        </div>
    </div>
