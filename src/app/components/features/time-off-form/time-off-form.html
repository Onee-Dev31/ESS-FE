<div class="time-off-form-page">
    <header class="top-header-strip">
        <h2>บันทึกข้อมูลการลา (Time Off)</h2>
        <div class="header-right-meta">
            <div class="info-badges">
                <span class="date-badge ml-2">วันที่ทำรายการ : {{ currentDate() }}</span>
            </div>
            <button class="btn-close-modal" (click)="close()"><i class="fas fa-times"></i></button>
        </div>
    </header>

    <main class="content-card">
        <!-- ขั้นตอนที่ 1: เลือกประเภทการลา -->
        <section class="form-section-wrapper">
            <h4 class="section-heading">1. เลือกประเภทการลา</h4>
            <div class="leave-type-grid">
                <div class="leave-type-card" *ngFor="let type of leaveTypes"
                    [class.active]="selectedLeaveType() === type.id" (click)="selectLeaveType(type.id)">
                    <div class="leave-body">
                        <div class="leave-header">
                            <div class="leave-icon">
                                <i [class]="type.icon" [style.color]="type.color"></i>
                            </div>
                        </div>
                        <p class="leave-label">{{ type.label }}</p>
                    </div>
                    <div class="leave-footer" [style.background-color]="type.color + '15'" [style.color]="type.color">
                        <span>คลิกเพื่อเลือก</span>
                        <i class="fas fa-check-circle" *ngIf="selectedLeaveType() === type.id"></i>
                    </div>
                </div>
            </div>
        </section>

        <!-- ขั้นตอนที่ 2: รายละเอียดการลา -->
        <section class="form-section-wrapper mt-4 animated-fade-in" *ngIf="selectedLeaveType()">
            <h4 class="section-heading">2. รายละเอียดการลา</h4>
            <div class="details-grid">
                <div class="date-range-group">
                    <div class="input-field-group">
                        <label>ประเภทการลา</label>
                        <div class="leave-period-options">
                            <label class="period-option" [class.active]="leavePeriod() === 'morning'">
                                <input type="radio" name="leavePeriod" value="morning"
                                    [checked]="leavePeriod() === 'morning'" (change)="leavePeriod.set('morning')">
                                <span class="option-label">
                                    <i class="fas fa-sun"></i>
                                    ลาเช้า
                                </span>
                            </label>
                            <label class="period-option" [class.active]="leavePeriod() === 'afternoon'">
                                <input type="radio" name="leavePeriod" value="afternoon"
                                    [checked]="leavePeriod() === 'afternoon'" (change)="leavePeriod.set('afternoon')">
                                <span class="option-label">
                                    <i class="fas fa-cloud-sun"></i>
                                    ลาบ่าย
                                </span>
                            </label>
                            <label class="period-option" [class.active]="leavePeriod() === 'full-day'">
                                <input type="radio" name="leavePeriod" value="full-day"
                                    [checked]="leavePeriod() === 'full-day'" (change)="leavePeriod.set('full-day')">
                                <span class="option-label">
                                    <i class="fas fa-calendar-day"></i>
                                    ลาเต็มวัน
                                </span>
                            </label>
                        </div>
                    </div>
                    <label>วันที่ลา (จาก - ถึง)</label>
                    <div class="range-inputs">
                        <div class="date-input-box">
                            <input type="date" class="custom-form-control" [ngModel]="startDate()"
                                (ngModelChange)="startDate.set($event)">
                        </div>
                        <div class="date-input-box">
                            <input type="date" class="custom-form-control" [ngModel]="endDate()"
                                (ngModelChange)="endDate.set($event)">
                        </div>
                    </div>
                    <div class="input-field-group">
                    <label>เวลากะ</label>
                    <div class="time-range-inputs">
                        <div class="time-input-box">
                            <label class="time-label">เริ่ม</label>
                            <input type="time" class="custom-form-control" [ngModel]="shiftStartTime()"
                                (ngModelChange)="shiftStartTime.set($event)">
                        </div>
                        <div class="time-separator">-</div>
                        <div class="time-input-box">
                            <label class="time-label">สิ้นสุด</label>
                            <input type="time" class="custom-form-control" [ngModel]="shiftEndTime()"
                                (ngModelChange)="shiftEndTime.set($event)">
                        </div>
                    </div>
                </div>
                    <div class="calculated-days-display">
                        <label>จำนวนวันลา</label>
                        <div class="days-value">
                            <span class="days-number">{{ calculatedDays() }}</span>
                            <span class="days-text">วัน</span>
                        </div>
                    </div>
                </div>

                <div class="input-field-group full-width">
                    <label>เหตุผลการลา</label>
                    <textarea class="custom-form-control" rows="3" placeholder="ระบุเหตุผลการลา..." [ngModel]="reason()"
                        (ngModelChange)="reason.set($event)"></textarea>
                </div>
            </div>
        </section>

        <!-- ขั้นตอนที่ 3: แนบเอกสาร -->
        <section class="form-section-wrapper mt-4 animated-fade-in" *ngIf="selectedLeaveType()">
            <div class="section-header-row">
                <h4 class="section-heading">3. แนบเอกสาร (ถ้ามี)</h4>
                <button class="btn-upload-file" (click)="triggerFileInput(fileInput)">
                    <i class="fas fa-file-upload"></i> Upload file
                </button>
                <input #fileInput type="file" style="display: none;" (change)="onFileSelected($event)" multiple>
            </div>
            <div class="attachment-table-container" *ngIf="attachments().length > 0">
                <table class="excel-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">#</th>
                            <th>ชื่อไฟล์</th>
                            <th style="width: 50px;">ลบ</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let file of attachments(); let i = index">
                            <td class="text-center">{{ i + 1 }}</td>
                            <td>{{ file.name }}</td>
                            <td class="text-center">
                                <button class="btn-delete-row" (click)="deleteAttachment(file.id)">
                                    <i class="far fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div class="selection-placeholder mt-5 mb-5" *ngIf="!selectedLeaveType()">
            <div class="placeholder-content">
                <i class="fas fa-mouse-pointer pulse-icon"></i>
                <p>กรุณาเลือกประเภทการลาด้านบนเพื่อดำเนินการต่อ</p>
            </div>
        </div>
    </main>

    <div class="form-actions-footer">
        <button class="btn-save-custom" (click)="save()">
            <i class="fas fa-check-circle"></i> ส่งใบลา
        </button>
        <button class="btn-back-custom" (click)="close()">
            <i class="fas fa-chevron-circle-left"></i> ยกเลิก
        </button>
    </div>
</div>
