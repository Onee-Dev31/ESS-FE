<div class="modal-overlay acknowledgeTicket">
    <div class="modal-container">
        <div>

            <header class="top-header-strip">
                <h2>รับเรื่อง</h2>
            </header>

            <form #ackForm="ngForm" (ngSubmit)="save(ackForm)">

                <div class="content-card">
                    <div>
                        <p>เลือกประเภทงาน<span class="required">*</span></p>
                    </div>

                    <div class="tag-group">

                        <label class="tag">
                            <input type="radio" name="tag" value="2" ngModel required>
                            <span>แจ้งปัญหา</span>
                        </label>

                        <label class="tag">
                            <input type="radio" name="tag" value="1" ngModel>
                            <span>แจ้งซ่อม</span>
                        </label>

                        <label class="tag">
                            <input type="radio" name="tag" value="3" ngModel>
                            <span>ขอใช้บริการ</span>
                        </label>

                    </div>

                    <!-- error message -->
                    <div *ngIf="ackForm.submitted && ackForm.invalid" style="color:red;">
                        กรุณาเลือกประเภทงาน
                    </div>

                </div>

                <div class="form-actions-footer">
                    <button type="button" class="btn-back-custom" (click)="close()">
                        <i class="fas fa-times"></i> ยกเลิก
                    </button>

                    <button type="submit" class="btn-save-custom" [disabled]="ackForm.invalid">
                        <i class="fas fa-paper-plane"></i> ยืนยัน
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
