<div class="modal-overlay acknowledgeTicket">
    <div class="modal-container">
        <div>

            <header class="top-header-strip">
                <h2>รับเรื่อง</h2>
            </header>

            <form #ackForm="ngForm" (ngSubmit)="save(ackForm)">

                <div class="content-card">
                    <div>

                        <div>
                            <p>เลือกประเภทงาน<span class="required">*</span></p>
                        </div>

                        <div class="tag-group">

                            <label class="tag">
                                <input type="radio" name="tag" [value]="2" [(ngModel)]="selectedTag">
                                <span>แจ้งปัญหา</span>
                            </label>

                            <label class="tag">
                                <input type="radio" name="tag" [value]="1" [(ngModel)]="selectedTag">
                                <span>แจ้งซ่อม</span>
                            </label>

                            <label class="tag">
                                <input type="radio" name="tag" [value]="3" [(ngModel)]="selectedTag">
                                <span>ขอใช้บริการ</span>
                            </label>

                        </div>

                        <!-- error message -->
                        <div *ngIf="ackForm.submitted && ackForm.invalid" style="color:red;">
                            กรุณาเลือกประเภทงาน
                        </div>
                    </div>
                    <div *ngIf="selectedTag === 1" style="margin: 10px;">
                        <textarea name="message" class="form-input note" placeholder="อธิบายรายละเอียด..."
                            [(ngModel)]="message"></textarea>
                        <!-- Field: ไฟล์แนบ -->
                        <input type="file" multiple hidden #fileInput (change)="onFileSelected($event)">
                        <button type="button" class="attach-btn" (click)="fileInput.click()">
                            <i class="fas fa-paperclip"></i>
                            แนบไฟล์

                        </button>
                    </div>
                </div>

                <div class="form-actions-footer">
                    <button type="button" class="btn-back-custom" (click)="close()">
                        <i class="fas fa-times"></i> ยกเลิก
                    </button>

                    <button type="submit" class="btn-save-custom" [disabled]="ackForm.invalid">
                        <i class="fas fa-paper-plane"></i> ยืนยัน
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
