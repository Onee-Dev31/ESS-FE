name: PR Gates

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: pr-gates-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm install
      - run: npx prettier --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm install
      - run: cp src/environments/environment.example.ts src/environments/environment.ts
      - run: npx tsc --noEmit

  test-coverage:
    name: Test + Coverage
    runs-on: ubuntu-latest
    outputs:
      percent: ${{ steps.cov.outputs.percent }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm install
      - run: cp src/environments/environment.example.ts src/environments/environment.ts
      - name: Run Tests + Coverage
        id: tests
        run: npx ng test --no-watch 2>&1 | tee test-output.txt; exit ${PIPESTATUS[0]}
      - name: Show Failed Tests
        if: failure() && steps.tests.conclusion == 'failure'
        run: |
          echo "::group::❌ Failed Tests"
          grep -E "FAIL|Error:|✗|×|expected|received" test-output.txt || cat test-output.txt
          echo "::endgroup::"
      - name: Parse Coverage
        id: cov
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            PERCENT=$(node -e "const s=require('./coverage/coverage-summary.json');console.log(s.total.lines.pct)")
          else
            PERCENT="N/A"
          fi
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm install
      - run: npm audit --audit-level=critical

  summary:
    name: PR Gates Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-coverage, security]
    if: always()
    steps:
      - uses: actions/checkout@v5
      - uses: actions/github-script@v8
        env:
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_TYPECHECK: ${{ needs.typecheck.result }}
          RESULT_TEST: ${{ needs.test-coverage.result }}
          RESULT_SECURITY: ${{ needs.security.result }}
          COVERAGE_PERCENT: ${{ needs.test-coverage.outputs.percent }}
        with:
          script: |
            const script = require('./.github/scripts/pr-gates-summary.js')
            await script({ github, context, core })

  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-coverage, security]
    if: github.event_name == 'pull_request' && success()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
