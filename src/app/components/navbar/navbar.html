<nav class="navbar">
  <div class="nav-left">
    <button class="icon-btn menu-trigger" (click)="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>
  </div>

  <div class="nav-center">
    <img src="ESS.png" alt="ESS Logo" class="nav-logo" />
    <h1 class="nav-title" routerLink="/dashboard">
      Employee Self-Service System
    </h1>
  </div>

  <div class="nav-right">
    <div class="search-box desktop-search">
      <input type="text" placeholder="Search..." [value]="searchQuery()" (input)="onSearchInput($event)"
        (focus)="isSearchFocused.set(true)" />
      <i class="fas fa-search search-icon"></i>

      <!-- Search Results Dropdown -->
      <div class="search-results-dropdown" *ngIf="isSearchFocused() && filteredSearchResults().length > 0">
        <div class="search-result-item" *ngFor="let result of filteredSearchResults()"
          (click)="navigateTo(result.path)">
          <div class="result-icon">
            <i class="fas" [ngClass]="result.icon"></i>
          </div>
          <div class="result-content">
            <div class="result-label">{{ result.label }}</div>
            <div class="result-category">{{ result.category }}</div>
          </div>
          <i class="fas fa-chevron-right result-arrow"></i>
        </div>
      </div>
    </div>

    <div class="nav-actions">
      <button class="icon-btn mobile-search-btn" (click)="toggleMobileSearch()">
        <i class="fas fa-search"></i>
      </button>

      <button class="icon-btn chart-icon-btn">
        <i class="fas fa-chart-line"></i>
        <span class="status-dot"></span>
      </button>

      <!-- Theme Toggle Button -->
      <button class="icon-btn theme-toggle-btn" (click)="themeService.toggleTheme()">
        <i class="fas" [ngClass]="{
            'fa-moon': !themeService.isDarkMode(),
            'fa-sun': themeService.isDarkMode()
          }"></i>
      </button>

      <div class="notification-dropdown" (click)="$event.stopPropagation()">
        <button class="icon-btn" (click)="toggleNotification()">
          <i class="fas fa-bell"></i>
          <span class="badge">{{ notifications().length }}</span>
        </button>

        <div class="dropdown-menu" *ngIf="isNotificationOpen">
          <div class="dropdown-header">การแจ้งเตือนล่าสุด</div>

          <a href="javascript:void(0)" class="dropdown-item" *ngFor="let item of notifications()">
            <div class="icon-circle" [ngClass]="{
                blue: item.status === 'pending',
                green: item.status === 'approved',
                red: item.status === 'rejected'
              }">
              <i class="fas" [ngClass]="{
                  'fa-hourglass-half': item.status === 'pending',
                  'fa-check': item.status === 'approved',
                  'fa-times': item.status === 'rejected'
                }"></i>
            </div>

            <div class="content">
              <p class="title">{{ item.title }}</p>
              <p class="message">{{ item.message }}</p>
              <span class="time">{{ item.time }}</span>
            </div>
          </a>

          <div class="dropdown-footer">
            <a href="javascript:void(0)">ดูทั้งหมด</a>
          </div>
        </div>
      </div>

      <div class="user-profile" (click)="$event.stopPropagation()">
        <img src="https://randomuser.me/api/portraits/women/44.jpg" class="avatar" (click)="toggleProfile()" />

        <div class="profile-dropdown" *ngIf="isProfileOpen">
          <div class="dropdown-user-info">
            <div class="name">{{ userName() }}</div>
            <div class="role">{{ userRole() }}</div>
          </div>
          <ul class="dropdown-menu-list">
            <li (click)="isProfileOpen = false">Settings</li>
            <li (click)="isProfileOpen = false">Activity log</li>
            <li class="divider"></li>
            <li class="logout" (click)="logout()">Logout</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Mobile Search Overlay -->
<div class="mobile-search-overlay" *ngIf="isMobileSearchOpen()">
  <div class="search-header">
    <div class="mobile-search-box">
      <i class="fas fa-search search-icon"></i>
      <input type="text" placeholder="Search..." [value]="searchQuery()" (input)="onSearchInput($event)" autofocus />
    </div>
    <button class="close-btn" (click)="toggleMobileSearch()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="mobile-search-results" *ngIf="searchQuery()">
    <div class="search-result-item" *ngFor="let result of filteredSearchResults()" (click)="navigateTo(result.path)">
      <div class="result-icon">
        <i class="fas" [ngClass]="result.icon"></i>
      </div>
      <div class="result-content">
        <div class="result-label">{{ result.label }}</div>
        <div class="result-category">{{ result.category }}</div>
      </div>
      <i class="fas fa-chevron-right result-arrow"></i>
    </div>
    <div class="no-results" *ngIf="filteredSearchResults().length === 0">
      <i class="fas fa-search"></i>
      <p>ไม่พบผลการค้นหา</p>
    </div>
  </div>
</div>
